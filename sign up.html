    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
    
        body {
          
              background: #F2F0F1;
        
        }
    </style>
</head>

<body>

  <!-- Top Bar -->
    <div class="top-bar bg-black text-white py-2 small text-center">
        Sign up and get 20% off your first order.
        <a href="sign up.html" class="text-white fw-bold">Sign Up Now</a>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white py-3 shadow-sm">
        <div class="container">

            <a class="navbar-brand fw-bold fs-2" href="index.html">SHOP.CO</a>
            <div class="icons d-flex align-items-center gap-3 ms-auto d-lg-none">

                <a href="card.html">
                    <i class="bi bi-cart2 fs-4"></i>
                </a>

                <a href="#">
                    <i class="bi bi-person fs-4"></i>
                </a>

                 <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button> 

            </div>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-lg-3">
                    <li class="nav-item dropdown">

                        <a class="nav-link me-2 fw-medium dropdown-toggle" href="#" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">

                            Shop

                        </a>

                        <ul class="dropdown-menu shadow border-0 rounded-4 mt-3">

                            <li><a class="dropdown-item me-3 py-2" href="product.html">Men</a></li>

                            <li><a class="dropdown-item py-2" href="#">Women</a></li>

                            <li><a class="dropdown-item py-2" href="#">Kids</a></li>

                            <li><a class="dropdown-item py-2" href="#">Accessories</a></li>

                            <li><a class="dropdown-item py-2" href="#">Shoes</a></li>

                        </ul>

                    </li>
                    <li class="nav-item  me-md-2 me-lg-3"><a class="nav-link fw-medium" href="#">On Sale</a></li>
                    <li class="nav-item  me-md-2 me-lg-3"><a class="nav-link fw-medium" href="index.html#New-Arrivals">New
                            Arrivals</a></li>
                    <li class="nav-item  me-md-2 me-lg-3"><a class="nav-link fw-medium" href="category.html">Brands</a>
                    </li>
                </ul>

                <form class="search-form mx-lg-3 flex-grow-1 position-relative">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0 rounded-start-pill">
                            <i class="bi bi-search"></i>
                        </span>

                        <input type="search" id="search" class="form-control bg-light border-0 rounded-end-pill"
                            placeholder="Search for products..." onkeyup="searchItems()">

                        <ul id="result" class="list-group position-absolute w-100 mt-5 "></ul>
                    </div>
                </form>


                <div class="icons d-none d-lg-flex justify-content-center align-items-center gap-4">

                    <a href="card.html"><i class="bi bi-cart2 fs-4"></i></a>

                    <i class="bi bi-person fs-4"></i>

                </div>

            </div>

        </div>
    </nav>


    <div class="container">

        <div class="signup-card">

            <h1 class="fw-bold text-center">Create Account</h1>

            <p class="text-center text-secondary mb-5">
                Sign up to get 20% off your first order.
            </p>

            <form>

                <!-- Full Name -->
                <label class="fw-semibold mb-2">Full Name</label>

                <div class="input-group mb-4">

                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>

                    <input type="text" class="form-control"
                        placeholder="Enter your full name">

                </div>

                <!-- Email -->
                <label class="fw-semibold mb-2">Email Address</label>

                <div class="input-group mb-4">

                    <span class="input-group-text">
                        <i class="bi bi-envelope"></i>
                    </span>

                    <input type="email" class="form-control"
                        placeholder="Enter your email address">

                </div>

                <!-- Password -->
                <label class="fw-semibold mb-2">Password</label>

                <div class="input-group mb-4">

                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>

                    <input type="password" class="form-control"
                        placeholder="Enter your password">

                    <span class="input-group-text border-start-0">
                        <i class="bi bi-eye"></i>
                    </span>

                </div>

                <!-- Confirm Password -->
                <label class="fw-semibold mb-2">Confirm Password</label>

                <div class="input-group mb-4">

                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>

                    <input type="password" class="form-control"
                        placeholder="Confirm your password">

                    <span class="input-group-text border-start-0">
                        <i class="bi bi-eye"></i>
                    </span>

                </div>

                <div class="form-check mb-4">

                    <input class="form-check-input" type="checkbox" id="check">

                    <label class="form-check-label" for="check">
                        I agree to the
                        <a href="#" class="text-secondary fw-bold">Terms & Conditions</a>
                        and
                        <a href="#" class="text-secondary fw-bold">Privacy Policy</a>
                    </label>

                </div>

                <button class="btn btn-dark w-100 btn-signup">
                    Sign Up
                </button>

            </form>

            <!-- Divider -->
            <div class="d-flex align-items-center my-4">

                <hr class="flex-grow-1">

                <span class="mx-3 text-secondary">or</span>

                <hr class="flex-grow-1">

            </div>

            <!-- Social Buttons -->
            <div class="row g-3">

                <div class="col-md-6">

                    <button class="btn btn-outline-secondary w-100 social-btn">

                        <img src="https://www.svgrepo.com/show/475656/google-color.svg"
                            width="22">

                        Sign up with Google

                    </button>

                </div>

                <div class="col-md-6">

                    <button class="btn btn-outline-secondary w-100 social-btn">

                        <i class="bi bi-apple fs-5"></i>

                        Sign up with Apple

                    </button>

                </div>

            </div>

            <p class="text-center mt-5 mb-0">

                Already have an account?

                <a href="login.html" class="text-secondary fw-bold">
                    Login
                </a>

            </p>

        </div>

    </div>

  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



</body>
</html>
